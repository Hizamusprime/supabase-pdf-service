services:
  - type: web
    name: supabase-pdf-server
    runtime: node
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: npm start
    disk:
      name: puppeteer-cache
      mountPath: /opt/render/project/src/.cache
      sizeGB: 1
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false